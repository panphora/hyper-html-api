<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blog Post</title>
<style>
  :root { color-scheme: light; }
  body {
    font-family: "Inter", Georgia, serif;
    max-width: 560px;
    margin: 2.5rem auto;
    padding: 0 1.25rem;
    color: #1b1d21;
    background: #fafaf7;
    line-height: 1.55;
  }
  h1 { font-size: 1.6rem; margin: 0 0 .25rem; letter-spacing: -0.01em; }
  .byline {
    color: #7a7d84;
    font-size: .82rem;
    margin: 0 0 .25rem;
  }
  .published-at {
    color: #9a9da4;
    font-size: .75rem;
    font-variant-numeric: tabular-nums;
    margin: 0 0 1.5rem;
    letter-spacing: .03em;
  }
  .body { margin: 1.25rem 0; }
  .body p { margin: 0 0 1rem; }
  .body em { color: #3a3d44; }
  .tag-cloud {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid #e7e6e1;
    display: flex;
    gap: .4rem;
    flex-wrap: wrap;
  }
  .tag-cloud .tag {
    font-size: .72rem;
    color: #5a5d64;
    background: #efede6;
    border-radius: 3px;
    padding: .25rem .55rem;
  }
</style>
</head>
<body>

<h1>Post Title</h1>
<p class="byline">by an author</p>
<p class="published-at">—</p>

<div class="body">
  <p>v2 template body.</p>
</div>

<footer class="tag-cloud">
  <span class="tag">default</span>
</footer>

<script type="application/hyper-html-api" id="hyper-html-api" data-rules-version="1">
{
  "title": "h1",
  "byline": ".byline",
  "publishedAt": ".published-at",
  "body": ".body@innerHTML",
  "tags": ".tag-cloud .tag[]"
}
</script>

<!-- Import the library so the iframe runner's helper-mode boot path fires.
     In production, every Hyperclay app already loads hyperclay.js, which
     embeds hyper-html-api. No transform is registered here — the runner
     falls through to pure name-match. -->
<script type="module" src="../../src/hyper-html-api.js"></script>

</body>
</html>
