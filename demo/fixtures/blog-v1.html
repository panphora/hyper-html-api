<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blog Post</title>
<style>
  :root { color-scheme: light; }
  body {
    font-family: "Inter", Georgia, serif;
    max-width: 560px;
    margin: 2.5rem auto;
    padding: 0 1.25rem;
    color: #1b1d21;
    background: #fafaf7;
    line-height: 1.55;
  }
  h1 { font-size: 1.6rem; margin: 0 0 .25rem; letter-spacing: -0.01em; }
  .byline { color: #7a7d84; font-size: .82rem; margin: 0 0 1.5rem; }
  .body { margin: 1.25rem 0; }
  .body p { margin: 0 0 1rem; }
  .body em { color: #3a3d44; }
  .tag-cloud {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid #e7e6e1;
    display: flex;
    gap: .4rem;
    flex-wrap: wrap;
  }
  .tag-cloud .tag {
    font-size: .72rem;
    color: #5a5d64;
    background: #efede6;
    border-radius: 3px;
    padding: .25rem .55rem;
  }
</style>
</head>
<body>

<h1>Doing the plumbing</h1>
<p class="byline">by David Miranda</p>

<div class="body">
  <p>There's a kind of work most engineers avoid. It's the plumbing — the boring glue that stitches one system to another.</p>
  <p><em>This is where real leverage lives.</em></p>
</div>

<footer class="tag-cloud">
  <span class="tag">essay</span>
  <span class="tag">tools</span>
  <span class="tag">craft</span>
</footer>

<script type="application/hyper-html-api" id="hyper-html-api" data-rules-version="1">
{
  "title": "h1",
  "byline": ".byline",
  "body": ".body@innerHTML",
  "tags": ".tag-cloud .tag[]"
}
</script>

</body>
</html>
