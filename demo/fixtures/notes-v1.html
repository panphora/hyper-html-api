<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Notes</title>
<style>
  :root { color-scheme: light; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    max-width: 560px;
    margin: 2rem auto;
    padding: 0 1.25rem;
    color: #1b1d21;
    background: #fafaf7;
  }
  .project-title { font-size: 1.5rem; margin: 0 0 .25rem; }
  .project-summary { color: #7a7d84; margin: 0 0 1.25rem; font-size: .9rem; }
  .section { margin-bottom: 1.25rem; }
  .section-title {
    font-size: .75rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #5a5d64;
    margin: 0 0 .4rem;
    padding-bottom: .25rem;
    border-bottom: 1px solid #e7e6e1;
  }
  .item {
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: .6rem;
    padding: .3rem 0;
  }
  .item .label { color: #8a8d94; font-size: .78rem; }
  .item .text { font-size: .9rem; }
</style>
</head>
<body>

<h1 class="project-title">Weekend Plan</h1>
<p class="project-summary">A very serious to-do list.</p>

<div class="section">
  <h2 class="section-title">Saturday</h2>
  <div class="item"><span class="label">am</span><span class="text">write tests for diff</span></div>
  <div class="item"><span class="label">pm</span><span class="text">ship playground</span></div>
</div>

<div class="section">
  <h2 class="section-title">Sunday</h2>
  <div class="item"><span class="label">am</span><span class="text">take a walk</span></div>
  <div class="item"><span class="label">pm</span><span class="text">read a book</span></div>
</div>

<script type="application/hyper-html-api" id="hyper-html-api" data-rules-version="1">
{
  "title": ".project-title",
  "summary": ".project-summary",
  "sections": [".section", {
    "title": ".section-title",
    "items": [".item", { "label": ".label", "text": ".text" }]
  }]
}
</script>

</body>
</html>
