<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>My Store</title>
<style>
  :root { color-scheme: light; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    max-width: 560px;
    margin: 2rem auto;
    padding: 0 1.25rem;
    color: #1b1d21;
    background: #fafaf7;
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 .25rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .subtitle { color: #7a7d84; margin: 0 0 1.5rem; font-style: italic; }
  main { padding-left: 1rem; border-left: 3px solid transparent; }
  main[data-featured="yes"] { border-left-color: #e8b57a; }
  .product {
    display: grid;
    grid-template-columns: 1fr auto;
    column-gap: .75rem;
    padding: .6rem 0 .65rem;
    border-bottom: 1px solid #e7e6e1;
  }
  .product:last-child { border-bottom: none; }
  .product .name { font-weight: 600; margin: 0; font-size: 1rem; grid-row: 1; }
  .product .price { color: #3a3d44; font-variant-numeric: tabular-nums; grid-row: 1; }
  .product .description {
    grid-column: 1 / -1;
    font-size: .82rem;
    color: #5a5d64;
    margin: .25rem 0 0;
  }
  .product .tag {
    grid-column: 1 / -1;
    font-size: .68rem;
    color: #8a8d94;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-top: .25rem;
  }
  .tag-cloud {
    margin-top: 1.5rem;
    display: flex;
    gap: .4rem;
    flex-wrap: wrap;
    padding-top: 1rem;
    border-top: 1px solid #e7e6e1;
  }
  .tag-cloud .tag {
    font-size: .72rem;
    color: #5a5d64;
    background: #efede6;
    border-radius: 3px;
    padding: .25rem .55rem;
  }
</style>
</head>
<body data-featured="yes">

<h1>Store Preview</h1>
<p class="subtitle">The v2 template default.</p>

<main>
  <div class="product">
    <h2 class="name">Sample Widget</h2>
    <div class="price">$—</div>
    <p class="description">Where the pitch goes.</p>
    <span class="tag">default</span>
  </div>
</main>

<footer class="tag-cloud">
  <span class="tag">v2</span>
</footer>

<script type="application/hyper-html-api" id="hyper-html-api" data-rules-version="1">
{
  "heading": "h1",
  "subtitle": ".subtitle",
  "featured": "@data-featured",
  "products": [".product", { "name": ".name", "price": ".price", "description": ".description", "tag": ".tag" }],
  "tags": ".tag-cloud .tag[]"
}
</script>

</body>
</html>
